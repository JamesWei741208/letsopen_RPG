<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>開店秘書 RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f1a;
      --panel: #1a1a2e;
      --panel2: #16213e;
      --border: #4a4a6a;
      --gold: #f5a623;
      --gold-dark: #e8930d;
      --text: #e8e8d0;
      --muted: #888888;
      --green: #27ae60;
      --green2: #2ecc71;
      --white: #ffffff;

      /* 字體大小 - 電腦版 */
      --fs-xs: 11px;
      --fs-sm: 13px;
      --fs-md: 15px;
      --fs-lg: 18px;
      --fs-xl: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 64px;
      font-family: 'Press Start 2P', monospace;
      color: var(--text);
    }

    /* ── 頂部標題 ── */
    .site-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .site-title {
      font-size: var(--fs-xl);
      color: var(--gold);
      letter-spacing: 3px;
      margin-bottom: 10px;
    }
    .site-sub {
      font-size: var(--fs-xs);
      color: var(--muted);
      line-height: 2.2;
    }

    /* ── 主容器 ── */
    #app {
      width: 100%;
      max-width: 640px;
      background: var(--panel);
      border: 3px solid var(--border);
      padding: 28px;
    }

    /* ── Top Bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel2);
      border: 2px solid var(--border);
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .quest-label { font-size: var(--fs-xs); color: var(--gold); margin-bottom: 6px; }
    .quest-title { font-size: var(--fs-md); color: var(--text); }
    .time-pill {
      margin-left: auto;
      font-size: var(--fs-xs);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 5px 10px;
      white-space: nowrap;
    }

    /* ── Progress ── */
    .progress-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 20px;
    }
    .pip {
      flex: 1;
      height: 8px;
      background: #333;
      border: 1px solid #444;
    }
    .pip.done { background: var(--gold); }
    .pip.active {
      background: var(--gold);
      animation: pulse 1s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.5 } to { opacity: 1 } }
    .prog-txt { font-size: var(--fs-xs); color: var(--muted); white-space: nowrap; }

    /* ── Dialog ── */
    .dialog {
      background: var(--panel2);
      border: 3px solid var(--text);
      padding: 20px;
      margin-bottom: 16px;
    }
    .speaker {
      font-size: var(--fs-sm);
      color: var(--gold);
      margin-bottom: 12px;
    }
    .dtext {
      font-size: var(--fs-sm);
      line-height: 2.4;
      color: var(--text);
    }
    .cursor {
      display: inline-block;
      width: 10px; height: 14px;
      background: var(--text);
      animation: blink .8s step-end infinite;
      vertical-align: middle;
      margin-left: 3px;
    }
    @keyframes blink { 50% { opacity: 0 } }

    /* ── Choices ── */
    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }
    .cbtn {
      background: var(--white);
      border: 3px solid #ccc;
      color: #1a1a2e;
      font-family: 'Press Start 2P', monospace;
      font-size: var(--fs-sm);
      padding: 16px 18px;
      cursor: pointer;
      text-align: left;
      transition: border-color .15s, background .15s;
      line-height: 2;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .cbtn:hover { border-color: var(--gold); background: #fff9ee; }
    .cbtn.selected { border-color: var(--gold); background: var(--gold); color: #1a1a2e; }
    .cbtn.selected .carr { color: #1a1a2e; }
    .carr { color: var(--gold); font-size: var(--fs-md); flex-shrink: 0; margin-top: 2px; }

    /* ── Input ── */
    .irow { display: flex; gap: 10px; align-items: stretch; margin-bottom: 12px; }
    .pinput {
      flex: 1;
      background: var(--white);
      border: 3px solid #ccc;
      color: #1a1a2e;
      font-family: 'Press Start 2P', monospace;
      font-size: var(--fs-sm);
      padding: 14px 16px;
      outline: none;
    }
    .pinput:focus { border-color: var(--gold); }
    .pinput::placeholder { color: #aaa; }

    /* ── Button ── */
    .pbtn {
      background: var(--gold);
      border: none;
      color: #1a1a2e;
      font-family: 'Press Start 2P', monospace;
      font-size: var(--fs-sm);
      padding: 14px 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .1s;
      flex-shrink: 0;
    }
    .pbtn:hover { background: var(--gold-dark); }

    /* ── Toast ── */
    .toast {
      background: var(--green);
      border: 2px solid var(--green2);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: var(--fs-xs);
      padding: 12px 16px;
      margin-bottom: 12px;
      animation: slideIn .3s ease;
      line-height: 2;
    }
    @keyframes slideIn {
      from { transform: translateY(-8px); opacity: 0 }
      to { transform: translateY(0); opacity: 1 }
    }

    /* ── Profile Card ── */
    .profile-card {
      background: var(--panel2);
      border: 3px solid var(--gold);
      padding: 24px;
      margin-top: 4px;
    }
    .pc-title {
      font-size: var(--fs-md);
      color: var(--gold);
      margin-bottom: 20px;
      text-align: center;
    }
    .pc-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #2a2a4a;
    }
    .pc-row:last-of-type { border-bottom: none; }
    .pc-lbl {
      font-size: var(--fs-xs);
      color: var(--muted);
      min-width: 72px;
      flex-shrink: 0;
      line-height: 2;
      margin-top: 2px;
    }
    .pc-val {
      font-size: var(--fs-sm);
      color: var(--text);
      line-height: 2;
      flex: 1;
    }
    .pc-badge {
      display: inline-block;
      background: var(--gold);
      color: #1a1a2e;
      font-size: var(--fs-xs);
      padding: 4px 10px;
      margin-top: 8px;
    }

    /* ── Reward ── */
    .reward-box {
      background: #0d2b1a;
      border: 2px solid var(--green);
      padding: 20px;
      margin-top: 16px;
      text-align: center;
    }
    .reward-title { font-size: var(--fs-sm); color: var(--green2); margin-bottom: 12px; }
    .xp-big { font-size: 28px; color: var(--gold); }
    .xp-sub { font-size: var(--fs-xs); color: var(--muted); margin-top: 6px; }
    .badge-row { display: flex; justify-content: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .badge {
      background: var(--panel2);
      border: 2px solid var(--gold);
      font-size: var(--fs-xs);
      color: var(--gold);
      padding: 10px 14px;
      text-align: center;
      line-height: 2;
    }

    /* ── Next Button ── */
    .next-btn {
      width: 100%;
      background: var(--gold);
      border: none;
      color: #1a1a2e;
      font-family: 'Press Start 2P', monospace;
      font-size: var(--fs-md);
      padding: 18px;
      cursor: pointer;
      margin-top: 16px;
      transition: background .1s;
    }
    .next-btn:hover { background: var(--gold-dark); }

    /* ── Coming Soon ── */
    .coming-soon {
      background: var(--panel2);
      border: 3px solid var(--border);
      padding: 40px 24px;
      text-align: center;
      margin-top: 4px;
    }
    .cs-icon { font-size: 48px; margin-bottom: 16px; }
    .cs-title { font-size: var(--fs-lg); color: var(--gold); margin-bottom: 16px; }
    .cs-desc { font-size: var(--fs-sm); color: var(--muted); line-height: 2.4; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      :root {
        --fs-xs: 10px;
        --fs-sm: 11px;
        --fs-md: 13px;
        --fs-lg: 15px;
        --fs-xl: 17px;
      }
      body { padding: 16px 12px 48px; }
      #app { padding: 16px; }
      .topbar { padding: 12px; flex-wrap: wrap; gap: 8px; }
      .time-pill { margin-left: 0; }
      .cbtn { padding: 14px 12px; }
      .pinput { padding: 12px; }
      .pbtn { padding: 12px 14px; }
      .irow { flex-direction: column; }
      .pbtn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="site-header">
    <div class="site-title">🏪 開店秘書 RPG</div>
    <div class="site-sub">從零開始・手把手・帶你開店</div>
  </div>

  <div id="app">
    <div class="topbar">
      <div>
        <div class="quest-label">第一章・夢想定位</div>
        <div class="quest-title">關卡 1：認識你自己</div>
      </div>
      <div class="time-pill">⏱ 約 30 分鐘</div>
    </div>

    <div class="progress-wrap">
      <div class="pip active" id="p0"></div>
      <div class="pip" id="p1"></div>
      <div class="pip" id="p2"></div>
      <div class="pip" id="p3"></div>
      <div class="pip" id="p4"></div>
      <span class="prog-txt" id="prog-txt">問題 1 / 5</span>
    </div>

    <div id="toast-area"></div>

    <div class="dialog">
      <div class="speaker" id="speaker">村長 老王</div>
      <div class="dtext" id="dtext">
        勇者，歡迎來到開店冒險！<br>
        在我們出發之前，<br>
        讓我先認識一下你吧。<br>
        你希望我怎麼稱呼你？
        <span class="cursor"></span>
      </div>
    </div>

    <div id="action-area"></div>
  </div>

  <script>
    const G = { name:'', status:'', exp:'', reason:'', strength:'', xp:0 };

    const pip = i => document.getElementById('p'+i);
    const progTxt = document.getElementById('prog-txt');
    const speaker = document.getElementById('speaker');
    const dtext = document.getElementById('dtext');
    const actionArea = document.getElementById('action-area');
    const toastArea = document.getElementById('toast-area');

    function setDialog(sp, txt) {
      speaker.textContent = sp;
      dtext.innerHTML = txt + '<span class="cursor"></span>';
    }

    function clearAction() { actionArea.innerHTML = ''; }

    function showChoices(arr) {
      clearAction();
      const div = document.createElement('div');
      div.className = 'choices';
      arr.forEach(c => {
        const b = document.createElement('button');
        b.className = 'cbtn';
        b.innerHTML = '<span class="carr">▶</span>' + c.label;
        b.onclick = () => {
          div.querySelectorAll('.cbtn').forEach(x => x.classList.remove('selected'));
          b.classList.add('selected');
          setTimeout(() => c.action(), 300);
        };
        div.appendChild(b);
      });
      actionArea.appendChild(div);
    }

    function showInput(ph, cb) {
      clearAction();
      const row = document.createElement('div');
      row.className = 'irow';
      const inp = document.createElement('input');
      inp.className = 'pinput'; inp.placeholder = ph;
      const btn = document.createElement('button');
      btn.className = 'pbtn'; btn.textContent = '確定 ▶';
      const go = () => {
        const v = inp.value.trim(); if (!v) return;
        btn.onclick = null; inp.onkeydown = null; cb(v);
      };
      btn.onclick = go;
      inp.onkeydown = e => { if (e.key === 'Enter') go(); };
      row.appendChild(inp); row.appendChild(btn);
      actionArea.appendChild(row);
      setTimeout(() => inp.focus(), 100);
    }

    function toast(msg) {
      const t = document.createElement('div');
      t.className = 'toast'; t.innerHTML = msg;
      toastArea.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    function advancePip(i) {
      if (i > 0) { pip(i-1).classList.remove('active'); pip(i-1).classList.add('done'); }
      if (i < 5) pip(i).classList.add('active');
      progTxt.textContent = '問題 ' + (i+1) + ' / 5';
    }

    function step0() {
      advancePip(0);
      setDialog('村長 老王', '勇者，歡迎來到開店冒險！<br>在我們出發之前，<br>讓我先認識一下你吧。<br>你希望我怎麼稱呼你？');
      showInput('輸入你的稱呼或小名...', v => {
        G.name = v;
        toast('★ 勇者「' + v + '」正式登錄！');
        setDialog('村長 老王', '「' + v + '」！這個名字很有力量！<br>很高興認識你～<br>那我先問問你，<br>目前你是什麼狀態呢？');
        setTimeout(() => step1(), 400);
      });
    }

    function step1() {
      advancePip(1);
      showChoices([
        { label: '還在上班，利用空閒時間規劃', action: () => pickStatus('還在上班，利用空閒時間規劃') },
        { label: '已離職，全心全意準備開店', action: () => pickStatus('已離職，全心全意準備開店') },
        { label: '想先兼職創業，評估可行性', action: () => pickStatus('兼職創業，邊走邊評估') },
        { label: '其他狀況（還在想）', action: () => pickStatus('其他，仍在規劃中') },
      ]);
    }

    function pickStatus(s) {
      G.status = s; G.xp += 20;
      toast('+20 XP！狀態確認完成');
      setDialog('老王', '了解！' + G.name + '，<br>「' + s + '」<br>每個狀態都有它的優勢。<br>接下來——<br>你有沒有餐飲相關的經驗呢？');
      setTimeout(() => step2(), 300);
    }

    function step2() {
      advancePip(2);
      showChoices([
        { label: '有正職餐飲工作經驗（1年以上）', action: () => pickExp('有正職餐飲工作經驗') },
        { label: '有打工或兼職經驗', action: () => pickExp('有打工或兼職餐飲經驗') },
        { label: '在家常做飯，對飲食很有熱情', action: () => pickExp('在家料理，對飲食充滿熱情') },
        { label: '完全沒有，但我有強烈的學習意願', action: () => pickExp('無相關經驗，但學習意願強') },
      ]);
    }

    function pickExp(e) {
      G.exp = e; G.xp += 20;
      toast('+20 XP！經驗值記錄完成');
      setDialog('老王', '收到！「' + e + '」<br>這些都是寶貴的資本。<br><br>現在我想更了解你——<br>是什麼讓你萌生了<br>開店的念頭呢？');
      setTimeout(() => step3(), 300);
    }

    function step3() {
      advancePip(3);
      showInput('說說你的故事，不用太長...', v => {
        G.reason = v; G.xp += 30;
        toast('+30 XP！開店動機解鎖！');
        setDialog('老王', '「' + v + '」<br><br>謝謝你的分享。<br>這份初心會是你<br>撐過難關的力量。<br><br>最後一題——<br>你覺得自己最大的優勢是什麼？');
        setTimeout(() => step4(), 400);
      });
    }

    function step4() {
      advancePip(4);
      showChoices([
        { label: '很會跟人互動，親和力強', action: () => pickStrength('親和力強，擅長人際互動') },
        { label: '對數字敏感，擅長分析規劃', action: () => pickStrength('數字敏感，擅長分析規劃') },
        { label: '有創意，擅長設計和品牌感', action: () => pickStrength('有創意，擅長品牌與設計') },
        { label: '執行力強，說到做到', action: () => pickStrength('執行力強，行動派') },
        { label: '廚藝或手藝很好', action: () => pickStrength('廚藝或手藝出色') },
      ]);
    }

    function pickStrength(s) {
      G.strength = s; G.xp += 30;
      clearAction();
      [0,1,2,3,4].forEach(i => {
        pip(i).classList.remove('active');
        pip(i).classList.add('done');
      });
      progTxt.textContent = '完成！';
      setDialog('老王', '「' + s + '」<br>這正是你的核心武器！<br><br>' + G.name + '，<br>你的冒險者檔案<br>已經建立完成了！');
      setTimeout(() => showResult(), 800);
    }

    function showResult() {
      clearAction();
      const statusMap = {
        '還在上班，利用空閒時間規劃': '穩健型',
        '已離職，全心全意準備開店': '全力衝刺型',
        '兼職創業，邊走邊評估': '彈性探索型',
        '其他，仍在規劃中': '蓄勢待發型',
      };
      const typeLabel = statusMap[G.status] || '探索型';
      const card = document.createElement('div');
      card.className = 'profile-card';
      card.innerHTML = `
        <div class="pc-title">★ 冒險者檔案 ★</div>
        <div class="pc-row">
          <div class="pc-lbl">稱呼</div>
          <div class="pc-val">${G.name}<div class="pc-badge">${typeLabel}創業者</div></div>
        </div>
        <div class="pc-row">
          <div class="pc-lbl">目前狀態</div>
          <div class="pc-val">${G.status}</div>
        </div>
        <div class="pc-row">
          <div class="pc-lbl">餐飲經驗</div>
          <div class="pc-val">${G.exp}</div>
        </div>
        <div class="pc-row">
          <div class="pc-lbl">開店動機</div>
          <div class="pc-val">${G.reason}</div>
        </div>
        <div class="pc-row">
          <div class="pc-lbl">核心優勢</div>
          <div class="pc-val">${G.strength}</div>
        </div>
        <div class="reward-box">
          <div class="reward-title">★ 關卡完成獎勵 ★</div>
          <div class="xp-big">+${G.xp} XP</div>
          <div class="xp-sub">獲得成就</div>
          <div class="badge-row">
            <div class="badge">自我認知者<br>徽章</div>
            <div class="badge">冒險者<br>檔案解鎖</div>
          </div>
        </div>
        <button class="next-btn" onclick="showComingSoon()">前往關卡 2 ▶</button>
      `;
      actionArea.appendChild(card);
      toast('★ 關卡 1 完成！冒險者檔案已建立！');
    }

    function showComingSoon() {
      actionArea.innerHTML = `
        <div class="coming-soon">
          <div class="cs-icon">🔒</div>
          <div class="cs-title">關卡 2 即將開放！</div>
          <div class="cs-desc">
            下一關：確定開店類型<br>
            與目標客群<br><br>
            敬請期待 ★
          </div>
        </div>
      `;
    }

    step0();
  </script>
</body>
</html>
